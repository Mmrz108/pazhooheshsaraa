<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="تماس با محمد میرزایی — طراح وبسایت پژوهش‌سرا">
<title>طراح وبسایت | محمد میرزایی</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563EB;
    --secondary: #7C3AED;
    --bg: #F8FAFC;
    --text: #0F172A;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --card-radius: 16px;
  }
  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg);
    color: var(--text);
    direction: rtl;
    min-height: 100vh;
  }
  .header {
    position: fixed; top: 0; right: 0; left: 0; z-index: 100;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); height: 64px;
    display: flex; align-items: center; padding: 0 1.25rem;
  }
  .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit; }
  .logo-img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }
  .logo-text { font-size: 1.1rem; font-weight: 700; display: block; line-height: 1.2; }
  .logo-sub { font-size: 0.65rem; color: var(--text-muted); display: block; }
  .page-main {
    padding: 6.5rem 1.25rem 3rem;
    max-width: 480px;
    margin: 0 auto;
  }
  .breadcrumb { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.25rem; }
  .breadcrumb a { color: var(--primary); text-decoration: none; }
  .profile-card {
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: var(--card-radius);
    padding: 2rem 1.75rem;
    text-align: center;
    box-shadow: 0 8px 32px rgba(37, 99, 235, 0.08);
  }
  .avatar {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: linear-gradient(135deg, #EFF6FF, #EDE9FE);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    margin: 0 auto 1.25rem;
    border: 3px solid #fff;
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.15);
  }
  .profile-name {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 0.35rem;
  }
  .profile-role {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 1.75rem;
  }
  .contact-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    text-align: right;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.15rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  a.contact-item:hover {
    border-color: var(--primary);
    box-shadow: 0 4px 16px rgba(37, 99, 235, 0.1);
  }
  .contact-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .contact-icon-phone {
    background: linear-gradient(135deg, #DCFCE7, #BBF7D0);
    color: #15803D;
  }
  .contact-icon-instagram {
    background: linear-gradient(135deg, #FCE7F3, #FDF2F8);
    color: #DB2777;
  }
  .contact-icon svg { width: 22px; height: 22px; }
  .contact-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.15rem;
  }
  .contact-value {
    font-size: 1rem;
    font-weight: 700;
    direction: ltr;
    text-align: right;
  }
  .contact-value.rtl { direction: rtl; text-align: right; }
  .footer-mini {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.8rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
  }
  .footer-mini a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo">
    <img class="logo-img" src="/images/logo.jpg" alt="پژوهش‌سرا" width="42" height="42">
    <div>
      <span class="logo-text">پژوهش‌سرا</span>
      <span class="logo-sub">مرکز علوم و فناوری</span>
    </div>
  </a>
</header>

<main class="page-main">
  <nav class="breadcrumb" aria-label="مسیر">
    <a href="/">خانه</a> › <span>طراح وبسایت</span>
  </nav>

  <div class="profile-card">
    <div class="avatar" aria-hidden="true">👨‍💻</div>
    <h1 class="profile-name">محمد میرزایی</h1>
    <p class="profile-role">برای طراحی وبسایت و گسترش کسب و کار خود تماس بگیرید</p>

    <div class="contact-list">
      <a href="tel:09137187161" class="contact-item">
        <span class="contact-icon contact-icon-phone" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.29h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.83a16 16 0 0 0 6.29 6.29l.84-.84a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </span>
        <div>
          <div class="contact-label">شماره تماس</div>
          <div class="contact-value">09137187161</div>
        </div>
      </a>

      <a href="https://www.instagram.com/mmrz108/" class="contact-item" target="_blank" rel="noopener noreferrer">
        <span class="contact-icon contact-icon-instagram" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </span>
        <div>
          <div class="contact-label">اینستاگرام</div>
          <div class="contact-value">@mmrz108</div>
        </div>
      </a>
    </div>
  </div>
</main>

<footer class="footer-mini">
  <a href="/">بازگشت به صفحه اصلی</a> · تمامی حقوق برای پژوهشسرا دانش آموزی شهید حجتی (نجف آباد) محفوظ می‌باشد.
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="جزئیات مقاله">
<title>مقاله | پژوهش‌سرا</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563EB; --secondary: #7C3AED; --bg: #F8FAFC;
    --text: #0F172A; --text-muted: #64748B; --border: #E2E8F0;
    --card-radius: 16px;
  }
  body { font-family: 'Vazirmatn', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }
  .header {
    position: fixed; top: 0; right: 0; left: 0; z-index: 100;
    background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border); height: 64px;
    display: flex; align-items: center; padding: 0 1.25rem;
  }
  .logo { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: inherit; }
  .logo-img { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }
  .logo-text { font-size: 1.1rem; font-weight: 700; display: block; line-height: 1.2; }
  .logo-sub { font-size: 0.65rem; color: var(--text-muted); display: block; }
  .page-main { padding: 6.5rem 1.25rem 3rem; max-width: 860px; margin: 0 auto; }
  .breadcrumb { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1.25rem; }
  .breadcrumb a { color: var(--primary); text-decoration: none; }
  .article-hero {
    background: #fff; border: 1.5px solid var(--border); border-radius: var(--card-radius);
    overflow: hidden; margin-bottom: 1.5rem;
  }
  .article-hero-img { width: 100%; max-height: 420px; object-fit: cover; display: block; }
  .article-hero-placeholder {
    width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center;
    font-size: 4rem; background: linear-gradient(135deg,#EFF6FF,#EDE9FE);
  }
  .article-content {
    background: #fff; border: 1.5px solid var(--border); border-radius: var(--card-radius);
    padding: 1.75rem;
  }
  .article-cat { font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-bottom: 0.75rem; }
  .article-title { font-size: clamp(1.5rem, 4vw, 2.1rem); font-weight: 800; line-height: 1.45; margin-bottom: 0.75rem; }
  .article-date { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.25rem; }
  .article-excerpt {
    font-size: 1rem; color: var(--text-muted); line-height: 1.9; margin-bottom: 1.5rem;
    padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
  }
  .article-body { font-size: 0.95rem; line-height: 2; color: var(--text); white-space: pre-line; }
  .loading-state, .empty-state { text-align: center; padding: 4rem 1rem; color: var(--text-muted); }
  .footer-mini {
    text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.8rem;
    border-top: 1px solid var(--border); margin-top: 3rem;
  }
  .footer-mini a { color: var(--primary); text-decoration: none; }
</style>
</head>
<body>

<header class="header">
  <a href="/" class="logo" data-site-logo>
    <img class="logo-img" src="/images/logo.jpg" alt="پژوهش‌سرا" width="42" height="42">
    <div>
      <span class="logo-text">پژوهش‌سرا</span>
      <span class="logo-sub">مرکز علوم و فناوری</span>
    </div>
  </a>
</header>

<main class="page-main" data-article-detail>
  <div class="loading-state">در حال بارگذاری مقاله...</div>
</main>

<footer class="footer-mini">
  <a href="/articles/">بازگشت به لیست مقالات</a> · تمامی حقوق برای پژوهشسرا دانش آموزی شهید حجتی (نجف آباد) محفوظ می‌باشد.
</footer>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/components.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
